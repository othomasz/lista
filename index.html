<html>
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
<style>
    body {
        margin: 0;
        font-family: "JetBrains Mono", monospace;
    }  
    .page {
        border-top: 8px solid #D6FFEC;
        border-bottom: 8px solid #D6FFEC;
        text-align: center;
        height: 100vh;
        box-sizing: border-box;
    }  

    .header_bg {
        display: flex;
        align-items: center;
        background-color: #3CF3C3;
        flex-direction: row;
        justify-content: space-evenly;
    }  

    .header {
        color: #053829;
        width: 100%;
        max-width: 700px;
        padding: 25px;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
    }

    .header h1 {
        margin: 0;
        font-size: 2.5em;
        font-weight: 800;
    }

    .header p {
        background-color: #D6FFEC;
        border-radius: 2.4em;
        margin: 0;
        font-size: 1.0em;
        font-weight: 700;
        padding: 0.0em 0.5em;
    }
    .numero {
        margin: 0;
        font-size: 3.0em;
        font-weight: 800;
    }
    .row {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
    }
</style>

</head>
<body>
    <div class="page">
        <div class="header_bg">
            <div class="header">
                <div class="row">
                    <p>• lista de exercícios</p>
                    <h1>Análise Combinatória</h1>
                </div>
                <h2 class="numero">#01</h2>
            </div>
            
    </div>
    <div class="content">
                <p>1. Quantas palavras podem ser formadas com as letras da palavra “COMBINATÓRIA”?</p>
        </div>
</body>

</html>
